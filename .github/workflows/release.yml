name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_bump:
        description: '版本递增类型'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch    # v1.0.0 → v1.0.1
          - minor    # v1.0.0 → v1.1.0
          - major    # v1.0.0 → v2.0.0

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build All Platforms & Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Generate version string
        id: version
        run: |
          # 获取最新的 tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          # 解析版本号
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          
          # 判断触发方式
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            # 打 tag 触发，直接用 tag 版本号
            NEW_VERSION=${GITHUB_REF#refs/tags/v}
            PRERELEASE=false
          else
            # 手动触发，根据选择递增版本
            BUMP_TYPE="${{ github.event.inputs.version_bump }}"
            case $BUMP_TYPE in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            PRERELEASE=false
            
            # 创建并推送新 tag
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v$NEW_VERSION"
            git push origin "v$NEW_VERSION"
            echo "Created and pushed tag: v$NEW_VERSION"
          fi
          
          echo "version=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "New version: v$NEW_VERSION"
      
      - name: Build all platforms
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # 设置版本号环境变量，确保 build.sh 使用正确的版本
          export VERSION=${{ steps.version.outputs.version }}
          export BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export GIT_COMMIT=$(git rev-parse --short HEAD)
          bash build.sh
      
      - name: Generate SHA256 checksums
        run: |
          cd bin
          sha256sum * > SHA256SUMS
          echo "=== Checksums ==="
          cat SHA256SUMS
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            bin/pic-bed-linux-amd64
            bin/pic-bed-linux-arm64
            bin/pic-bed-linux-armv7
            bin/pic-bed-windows-amd64.exe
            bin/pic-bed-darwin-amd64
            bin/pic-bed-darwin-arm64
            bin/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update README with latest version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "Updating README to version $VERSION"
          
          git fetch origin main
          git checkout main
          git pull origin main
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          sed -i "s/<!-- version -->v[0-9.]*<!-- \/version -->/<!-- version -->$VERSION<!-- \/version -->/g" README.md
          sed -i "s|/download/v[0-9.]*/|/download/$VERSION/|g" README.md
          
          if git diff --quiet README.md; then
            echo "README unchanged, skip commit"
          else
            git add README.md
            git commit -m "docs: update README to $VERSION"
            git push origin main
            echo "README updated to $VERSION"
          fi