name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build All Platforms & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install UPX
        run: sudo apt update && sudo apt install -y upx-ucl

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build all platforms
        run: ./build.sh

      - name: Compress binaries with UPX
        run: upx --best bin/*

      - name: Generate SHA256 checksums
        run: |
          cd bin
          sha256sum * > SHA256SUMS
          echo "=== Checksums ==="
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            bin/pic-bed-linux-amd64
            bin/pic-bed-linux-arm64
            bin/pic-bed-linux-armv7
            bin/pic-bed-windows-amd64.exe
            bin/pic-bed-darwin-amd64
            bin/pic-bed-darwin-arm64
            bin/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README with latest version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Updating README to version $VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          sed -i "s/<!-- version -->v[0-9.]*<!-- \/version -->/<!-- version -->$VERSION<!-- \/version -->/g" README.md
          sed -i "s|/download/v[0-9.]*/|/download/$VERSION/|g" README.md

          if git diff --quiet; then
            echo "README unchanged, skip commit"
          else
            git add README.md
            git commit -m "docs: update README to $VERSION"
            git push origin HEAD:main
            echo "README updated to $VERSION"
          fi
