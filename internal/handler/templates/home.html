<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800">
    <title>Welcome to awang! :)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: #fff;
            /* 规范方式：缩小整体页面到80% */
            transform: scale(0.8);
            transform-origin: top center;
        }
        .container {
            text-align: center;
            max-width: 500px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 20px;
        }
        .avatar {
            width: 300px;
            height: 300px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .avatar.default {
            background: linear-gradient(135deg, #ff6b9d 0%, #ffa3c4 100%);
            font-size: 120px;
        }
        .avatar.default::before {
            content: "✨";
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 40px;
            animation: twinkle 2s ease-in-out infinite;
        }
        .avatar.default::after {
            content: "⭐";
            position: absolute;
            top: 50px;
            right: 40px;
            font-size: 25px;
            animation: twinkle 2s ease-in-out infinite 0.5s;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 修改圆角：在这里调整 border-radius 的值 */
            border-radius: 15px;
        }
        .avatar .face {
            font-size: 150px;
            z-index: 1;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        p {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .ip {
            font-size: 1rem;
            color: #666;
            font-family: monospace;
            margin-top: 10px;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #999;
        }
        .footer a:hover {
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .upload-btn-mini {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            text-decoration: none;
            font-size: 20px;
            line-height: 1;
            transition: color 0.2s ease;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .upload-btn-mini:hover {
            color: #000;
        }
    </style>
</head>
<body>
    <a href="/upload" class="upload-btn-mini" title="上传图片">⬆</a>
    <div class="container">
        <h1>Welcome to awang! :)</h1>

        {{if .AvatarURL}}
        <div class="avatar">
            <img src="{{.AvatarURL}}" alt="avatar">
        </div>
        {{else}}
        <div class="avatar default">
            <span class="face">🥰</span>
        </div>
        {{end}}
        <p>I serve photos. You'll need a URL.</p>
        <p></p>
        <p class="ip">{{.ClientIP}}</p>
    </div>
    <div class="footer">
        <a href="https://github.com/renjiu13/Pic-bed"
           target="_blank"
           style="color: inherit; text-decoration: none;">
            Pic Bed
        </a> · 极轻量私有图床
    </div>
</body>
</html>
