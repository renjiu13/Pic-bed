<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to awang! :)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            width: 100%;
            background: #fff;
            color: #000;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 核心缩放容器：使整体内容完美缩放到 75%，且不破坏 position: fixed */
        .page-wrapper {
            transform: scale(0.80);
            transform-origin: center center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 133.33%; /* 1 / 0.75，抵消缩放带来的宽度变窄，确保居中完美 */
            height: 133.33%; /* 抵消高度缩放，避免留白 */
            padding: 40px 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 20px;
        }

        /* 头像样式调整：无边框、无多余背景，更加干净透亮 */
        .avatar {
            width: 300px;
            height: 300px;
            margin: 0 auto 20px;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: transparent; /* 移除默认灰色底色，彻底透亮 */
        }

        .avatar.default {
            background-color: transparent; /* 默认头像也改为彻底透明无底色 */
            font-size: 120px;
        }

        .avatar.default::before {
            content: "✨";
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 40px;
            animation: twinkle 2s ease-in-out infinite;
        }

        .avatar.default::after {
            content: "⭐";
            position: absolute;
            top: 50px;
            right: 40px;
            font-size: 25px;
            animation: twinkle 2s ease-in-out infinite 0.5s;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar .face {
            font-size: 150px;
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        p {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .ip {
            font-size: 1rem;
            color: #666;
            font-family: monospace;
            margin-top: 10px;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #999;
        }

        .footer a {
            color: #999;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: #333;
        }

        /* 保持在屏幕右上角，不随页面 75% 缩放而位移，但视觉大小也适当缩小以适配整体感 */
        .upload-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background-color: #fff;
            color: #666;
            text-decoration: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            z-index: 1000;
        }

        .upload-btn:hover {
            background-color: #f5f5f5;
            border-color: #999;
            color: #000;
        }

        .upload-btn:active {
            background-color: #eee;
        }

        @media (max-width: 480px) {
            .page-wrapper {
                padding: 40px 16px;
            }

            .avatar {
                width: 220px;
                height: 220px;
            }

            .avatar.default {
                font-size: 80px;
            }

            .avatar .face {
                font-size: 100px;
            }
        }
    </style>
</head>
<body>
    <a href="/upload" class="upload-btn" title="上传图片">⬆</a>

    <div class="page-wrapper">
        <div class="container">
            <h1>Welcome to awang! :)</h1>

            {{if .AvatarURL}}
            <div class="avatar">
                <img src="{{.AvatarURL}}" alt="avatar">
            </div>
            {{else}}
            <div class="avatar default">
                <span class="face">🥰</span>
            </div>
            {{end}}

            <p>I serve photos. You'll need a URL.</p>
            <p></p>
            <p class="ip">{{.ClientIP}}</p>
        </div>

        <div class="footer">
            <a href="https://github.com/renjiu13/Pic-bed" target="_blank">Pic Bed</a> · 极轻量私有图床
        </div>
    </div>
</body>
</html>
