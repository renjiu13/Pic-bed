<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800">
    <title>图片上传 - Pic Bed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: #fff;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 16px;
            padding: 40px 20px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #ff6b9d;
        }
        .upload-area.dragover {
            border-color: #ff6b9d;
            background: #fff5f8;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .upload-text {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }
        .upload-hint {
            color: #999;
            font-size: 0.8rem;
        }
        .file-input {
            display: none;
        }
        .api-key-section {
            margin-bottom: 20px;
            text-align: left;
        }
        .api-key-section label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 6px;
        }
        .api-key-section input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .api-key-section input:focus {
            border-color: #ff6b9d;
        }
        .upload-btn {
            width: 100%;
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff6b9d 0%, #ffa3c4 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .upload-btn:hover {
            opacity: 0.9;
        }
        .upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result-area {
            margin-top: 24px;
            text-align: left;
            display: none;
        }
        .result-area.show {
            display: block;
        }
        .result-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        .result-preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 12px;
            background: #f5f5f5;
        }
        .result-url {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .result-url input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: monospace;
            background: #f9f9f9;
        }
        .copy-btn {
            padding: 8px 14px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .copy-btn:hover {
            background: #e0e0e0;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #999;
        }
        .footer a {
            color: inherit;
            text-decoration: none;
        }
        .footer a:hover {
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 图片上传</h1>

        {{if .NeedAPIKey}}
        <div class="api-key-section">
            <label for="apiKey">API Key</label>
            <input type="password" id="apiKey" placeholder="请输入 API Key">
        </div>
        {{end}}

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">点击或拖拽图片到此处上传</div>
            <div class="upload-hint">支持 {{.AllowedTypes}} · 最大 {{.MaxSize}}MB</div>
        </div>
        <input type="file" class="file-input" id="fileInput" accept="image/*">

        <button class="upload-btn" id="uploadBtn" disabled>选择图片后上传</button>

        <div class="result-area" id="resultArea">
            <div class="result-title">✅ 上传成功</div>
            <img class="result-preview" id="resultPreview" alt="预览">
            <div class="result-url">
                <input type="text" id="resultURL" readonly>
                <button class="copy-btn" onclick="copyURL()">复制</button>
            </div>
        </div>

        <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="footer">
        <a href="https://github.com/renjiu13/Pic-bed" target="_blank">Pic Bed</a> · 极轻量私有图床
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const resultArea = document.getElementById('resultArea');
        const resultPreview = document.getElementById('resultPreview');
        const resultURL = document.getElementById('resultURL');
        const errorMsg = document.getElementById('errorMsg');
        const apiKeyInput = document.getElementById('apiKey');

        let selectedFile = null;

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            selectedFile = file;
            uploadBtn.disabled = false;
            uploadBtn.textContent = '上传 ' + file.name;
            errorMsg.textContent = '';
            resultArea.classList.remove('show');
        }

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                fileInput.click();
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.textContent = '上传中...';
            errorMsg.textContent = '';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const headers = {};
                {{if .NeedAPIKey}}
                const apiKey = apiKeyInput.value.trim();
                if (!apiKey) {
                    throw new Error('请输入 API Key');
                }
                headers['Authorization'] = 'Bearer ' + apiKey;
                {{end}}

                const response = await fetch('/upload', {
                    method: 'POST',
                    headers: headers,
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    resultPreview.src = data.url;
                    resultURL.value = window.location.origin + data.url;
                    resultArea.classList.add('show');
                    selectedFile = null;
                    fileInput.value = '';
                    uploadBtn.textContent = '选择图片后上传';
                    uploadBtn.disabled = true;
                } else {
                    throw new Error(data.message || '上传失败');
                }
            } catch (err) {
                errorMsg.textContent = '❌ ' + err.message;
                uploadBtn.textContent = '重新上传';
                uploadBtn.disabled = false;
            }
        });

        function copyURL() {
            resultURL.select();
            document.execCommand('copy');
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '已复制';
            setTimeout(() => btn.textContent = originalText, 1500);
        }
    </script>
</body>
</html>
